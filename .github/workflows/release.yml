name: Build & Release Gens Horizon (Manuel)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Nom de la version (ex: v1.1.0)'
        required: true
        default: 'v1.1.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Installation des dépendances
        run: npm install

      # NOUVELLE ÉTAPE : Création du config.js avec les 3 providers
      - name: Injection des identifiants API (config.js)
        run: |
          cat << 'EOF' > config.js
          module.exports = {
              credentials: {
                  google: {
                      client_id: "${{ secrets.G_CLIENT_ID }}",
                      client_secret: "${{ secrets.G_CLIENT_SECRET }}",
                      auth_uri: "https://accounts.google.com/o/oauth2/auth",
                      token_uri: "https://oauth2.googleapis.com/token",
                      redirect_uri: "http://127.0.0.1:12543"
                  },
                  dropbox: {
                      client_id: "${{ secrets.D_CLIENT_ID }}",
                      client_secret: "${{ secrets.D_CLIENT_SECRET }}",
                      auth_uri: "https://www.dropbox.com/oauth2/authorize",
                      token_uri: "https://api.dropbox.com/oauth2/token",
                      redirect_uri: "http://127.0.0.1:12544"
                  },
                  onedrive: {
                      client_id: "${{ secrets.O_CLIENT_ID }}",
                      client_secret: "",
                      auth_uri: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize",
                      token_uri: "https://login.microsoftonline.com/common/oauth2/v2.0/token",
                      redirect_uri: "http://127.0.0.1:12545",
                      scope: "Files.ReadWrite offline_access User.Read"
                  }
              }
          };
          EOF

      - name: Compilation avec pkg
        run: npm run dist

      - name: Préparation des fichiers
        run: |
          mv dist/Horizon-win.exe dist/Horizon.exe || true
          mv dist/Horizon-linux dist/Horizon-linux || true

      - name: Publication sur GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          files: |
            dist/Horizon.exe
            dist/Horizon-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}